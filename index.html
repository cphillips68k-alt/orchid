<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orchid</title>
    <style>
        :root {
            --blue:   #5b9bd5;
            --coral:  #e8736a;
            --mint:   #a8d5c8;
            --lime:   #c8e05a;
            --yellow: #f0d050;
            --gray:   #7a8590;
            --accent: #5b9bd5;

            --win-bg:          rgba(255, 255, 255, 0.72);
            --win-border:      rgba(255, 255, 255, 0.9);
            --win-shadow:      0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
            --titlebar-bg:     rgba(255, 255, 255, 0.55);
            --titlebar-text:   #2a2a2a;
            --titlebar-border: rgba(0,0,0,0.07);
            --window-blur: 28px;
        }

        :root[data-theme='dark'] {
            --win-bg: rgba(18, 22, 32, 0.92);
            --win-border: rgba(255, 255, 255, 0.08);
            --titlebar-bg: rgba(22, 26, 38, 0.82);
            --titlebar-text: #f5f5f5;
            --titlebar-border: rgba(255, 255, 255, 0.1);
        }

        body[data-theme='dark']::before {
            background: rgba(0,0,0,0.22);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            background: url('./wallpaper.webp') center/cover no-repeat;
            font-family: 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
        }

        .window {
            background: var(--win-bg);
            backdrop-filter: blur(28px) saturate(1.4);
            -webkit-backdrop-filter: blur(28px) saturate(1.4);
            border: 1px solid var(--win-border);
            border-radius: 14px;
            position: absolute;
            box-shadow: var(--win-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 280px;
        }

        /* Added the Resize Grabber visual */
        .window::after {
            content: "";
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-right: 2px solid rgba(0,0,0,0.15);
            border-bottom: 2px solid rgba(0,0,0,0.15);
            pointer-events: none;
        }

        .title-bar {
            padding: 11px 14px 10px;
            background: var(--titlebar-bg);
            cursor: grab;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--titlebar-text);
            border-bottom: 1px solid var(--titlebar-border);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .title-bar:active { cursor: grabbing; }

        .close-btn {
            background: var(--coral);
            border: none;
            color: rgba(255,255,255,0.95);
            cursor: pointer;
            font-size: 11px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            padding: 0;
            opacity: 0.85;
        }
        .close-btn:hover { opacity: 1; transform: scale(1.1); }

        .content {
            color: #1a1a1a;
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .taskbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.62);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            padding: 10px 22px;
            border-radius: 50px;
            display: flex;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.92);
            align-items: center;
            z-index: 9999;
            box-shadow: 0 4px 24px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.07);
        }

        .taskbar-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: var(--accent);
            text-transform: uppercase;
            padding-right: 12px;
            border-right: 1px solid rgba(0,0,0,0.1);
            margin-right: 2px;
        }

        .app-icon {
            background: rgba(255,255,255,0.65);
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.07);
        }
        .app-icon:hover {
            background: white;
            transform: translateY(-7px) scale(1.12);
            box-shadow: 0 10px 24px rgba(0,0,0,0.14);
            border-color: rgba(0,0,0,0.1);
        }
        .taskbar.compact {
            padding: 8px 14px;
            gap: 8px;
        }
        .taskbar.compact .app-icon {
            width: 38px;
            height: 38px;
        }
        .taskbar.top {
            top: 20px;
            bottom: auto;
            transform: translateX(-50%);
        }
        .taskbar.left, .taskbar.right {
            top: 50%;
            bottom: auto;
            transform: translateY(-50%);
            flex-direction: column;
            border-radius: 28px;
            padding: 14px 12px;
        }
        .taskbar.left { left: 20px; right: auto; }
        .taskbar.right { right: 20px; left: auto; }
        .taskbar.labels .app-icon {
            flex-direction: column;
        }
        .taskbar.labels .app-icon span {
            margin-top: 4px;
            font-size: 10px;
            color: #555;
            text-align: center;
            max-width: 72px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { h, render } from 'https://esm.sh/preact';
        import { useState, useEffect, useRef } from 'https://esm.sh/preact/hooks';

        // --- CORE SYSTEM SERVICES ---
        import { bus }      from './sys/bus.js';
        import { getFS }    from './sys/fs.js';
        import { settings } from './sys/settings.js';

        // --- USERSPACE APPLICATIONS ---
        import { APPS } from './sys/registry.js';

        const ACCENT_COLORS = {
            blue: '#5b9bd5',
            coral: '#e8736a',
            mint: '#a8d5c8',
            lime: '#c8e05a'
        };

        const BLUR_VALUES = {
            soft: '18px',
            medium: '28px',
            strong: '42px'
        };

        function WelcomeCard() {
            const dot = (color) => h('div', { style: `width:8px; height:8px; border-radius:50%; background:${color}; flex-shrink:0;` });
            const row = (icon, text) => h('div', {
                style: 'display:flex; align-items:center; gap:10px; padding:5px 0; color:#555; font-size:13px;'
            }, [ h('span', { style: 'font-size:15px; width:20px; text-align:center;' }, icon), h('span', null, text) ]);

            return h('div', { style: 'padding:22px 20px;' }, [
                h('div', { style: 'display:flex; align-items:center; gap:8px; margin-bottom:20px;' }, [
                    dot('#5b9bd5'), dot('#e8736a'), dot('#c8e05a'),
                    h('span', { style: 'font-size:17px; font-weight:700; letter-spacing:0.5px; color:#1a1a1a; margin-left:4px;' }, 'Orchid'),
                    h('span', { style: 'font-size:11px; color:#bbb; font-weight:400;' }, 'v0.1'),
                ]),
                row('💾', 'Persistent virtual filesystem'),
                row('⌨️', 'Terminal — ls, cd, cat, rm…'),
                row('🗂', 'File Manager — browse & edit'),
                row('📝', 'Notepad — dbl-click to open files'),
                h('div', { style: 'margin-top:18px; padding-top:14px; border-top:1px solid rgba(0,0,0,0.06); font-size:11px; color:#bbb; letter-spacing:0.3px;' },
                    'Files persist across page refreshes ↓'
                )
            ]);
        }

        function Window({ title, children, initialX, initialY, onClose, onFocus, zIndex, width: initialWidth }) {
            const [pos, setPos] = useState({ x: initialX, y: initialY });
            const [size, setSize] = useState({ w: initialWidth ?? 400, h: 300 });
            const [dragging, setDragging] = useState(false);
            const [resizing, setResizing] = useState(false);
            const [rel, setRel] = useState({ x: 0, y: 0 });

            const onMouseDown = (e) => {
                onFocus();
                if (e.button !== 0) return;
                setDragging(true);
                setRel({ x: e.pageX - pos.x, y: e.pageY - pos.y });
                e.preventDefault();
            };

            const startResize = (e) => {
                onFocus();
                setResizing(true);
                setRel({ x: e.pageX - size.w, y: e.pageY - size.h });
                e.preventDefault();
                e.stopPropagation();
            };

            useEffect(() => {
                const handleMove = (e) => {
                    if (dragging) {
                        setPos({ x: e.pageX - rel.x, y: e.pageY - rel.y });
                    } else if (resizing) {
                        setSize({
                            w: Math.max(280, e.pageX - rel.x),
                            h: Math.max(150, e.pageY - rel.y)
                        });
                    }
                };
                const stop = () => { setDragging(false); setResizing(false); };

                if (dragging || resizing) {
                    window.addEventListener('mousemove', handleMove);
                    window.addEventListener('mouseup', stop);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('mouseup', stop);
                };
            }, [dragging, resizing, rel]);

            return h('div', {
                class: 'window',
                style: {
                    left: `${pos.x}px`,
                    top: `${pos.y}px`,
                    zIndex,
                    width: `${size.w}px`,
                    height: `${size.h}px`
                },
                onMouseDown: onFocus
            }, [
                h('div', { class: 'title-bar', onMouseDown }, [
                    h('span', null, title),
                    h('button', { class: 'close-btn', onClick: (e) => { e.stopPropagation(); onClose(); } }, '✕')
                ]),
                h('div', { class: 'content' }, children),
                h('div', {
                    onMouseDown: startResize,
                    style: 'position:absolute; bottom:0; right:0; width:15px; height:15px; cursor:nwse-resize; z-index:10;'
                })
            ]);
        }

        function Desktop() {
            const rootSettings = settings.get();
            const [prefs, setPrefs] = useState(rootSettings);
            const [windows, setWindows] = useState(
                rootSettings.showWelcome
                    ? [{ id: 1, appKey: 'welcome', title: 'Orchid', x: 60, y: 55, width: 310, component: WelcomeCard }]
                    : []
            );
            const [topZ, setTopZ] = useState(10);
            const [windowZs, setWindowZs] = useState(rootSettings.showWelcome ? { 1: 10 } : {});
            const appWindowMap = useRef({});

            useEffect(() => {
                document.documentElement.dataset.theme = rootSettings.theme;
                document.documentElement.style.setProperty('--accent', ACCENT_COLORS[rootSettings.accent] ?? '#5b9bd5');
                document.documentElement.style.setProperty('--window-blur', BLUR_VALUES[rootSettings.windowBlur] ?? '28px');

                const unsubSettings = settings.onChange((next) => {
                    document.documentElement.dataset.theme = next.theme;
                    document.documentElement.style.setProperty('--accent', ACCENT_COLORS[next.accent] ?? '#5b9bd5');
                    document.documentElement.style.setProperty('--window-blur', BLUR_VALUES[next.windowBlur] ?? '28px');
                    setPrefs(next);
                    setWindows(prev => {
                        const hasWelcome = prev.some(w => w.appKey === 'welcome');
                        if (next.showWelcome && !hasWelcome) {
                            return [{ id: 1, appKey: 'welcome', title: 'Orchid', x: 60, y: 55, width: 310, component: WelcomeCard }, ...prev];
                        }
                        if (!next.showWelcome) {
                            return prev.filter(w => w.appKey !== 'welcome');
                        }
                        return prev;
                    });
                    setWindowZs(prev => {
                        const nextZ = { ...prev };
                        if (next.showWelcome) nextZ[1] = 10;
                        else delete nextZ[1];
                        return nextZ;
                    });
                });
                return unsubSettings;
            }, []);

            useEffect(() => {
                const unsubFocus = bus.on('focus-app', (appKey) => {
                    const id = appWindowMap.current[appKey];
                    if (id != null) {
                        const newZ = topZ + 1;
                        setTopZ(newZ);
                        setWindowZs(prev => ({ ...prev, [id]: newZ }));
                    } else {
                        launch(appKey);
                    }
                });

                const unsubCloseRequest = bus.on('close-window', (id) => {
                    const window = windows.find(w => w.id === id);
                    if (window) closeWindow(id, window.appKey);
                });

                const unsubTaskList = bus.on('request-task-list', () => {
                    windows.forEach(w => bus.emit('window-opened', { id: w.id, title: w.title, appKey: w.appKey }));
                });

                return () => {
                    unsubFocus();
                    unsubCloseRequest();
                    unsubTaskList();
                };
            }, [topZ, windows]);

            const launch = (appKey) => {
                const app = APPS[appKey];
                if (!app) return;
                const newZ = topZ + 1;
                const newId = Date.now();
                setTopZ(newZ);
                setWindowZs(prev => ({ ...prev, [newId]: newZ }));
                appWindowMap.current[appKey] = newId;
                setWindows(prev => [...prev, {
                    id: newId, appKey,
                    title: app.title,
                    x: 80 + (prev.length % 7) * 32,
                    y: 80 + (prev.length % 7) * 32,
                    width: app.width,
                    component: app.component
                }]);
                bus.emit('window-opened', { id: newId, title: app.title, appKey });
            };

            const closeWindow = (id, appKey) => {
                bus.emit('window-closed', id);
                setWindows(prev => prev.filter(w => w.id !== id));
                setWindowZs(prev => { const n = { ...prev }; delete n[id]; return n; });
                if (appWindowMap.current[appKey] === id) delete appWindowMap.current[appKey];
            };

            const focusWindow = (id, appKey) => {
                const newZ = topZ + 1;
                setTopZ(newZ);
                setWindowZs(prev => ({ ...prev, [id]: newZ }));
                appWindowMap.current[appKey] = id;
            };

            return h('div', { style: 'height:100vh; width:100vw;' }, [
                windows.map(w => h(Window, {
                    key: w.id, title: w.title,
                    initialX: w.x, initialY: w.y,
                    width: w.width,
                    zIndex: windowZs[w.id] ?? 10,
                    onClose: () => closeWindow(w.id, w.appKey),
                    onFocus: () => focusWindow(w.id, w.appKey)
                }, h(w.component))),
                h('div', { class: `taskbar${prefs.compactTaskbar ? ' compact' : ''} ${prefs.taskbarPosition} ${prefs.showTaskbarLabels ? 'labels' : ''}` }, [
                    h('span', { class: 'taskbar-label' }, 'Orchid'),
                    ...Object.entries(APPS).map(([key, app]) => h('button', {
                        class: 'app-icon',
                        onClick: () => launch(key),
                        title: app.title
                    }, [
                        h('img', {
                            src: app.iconUrl,
                            alt: app.title,
                            style: 'width:22px; height:22px;'
                        }),
                        prefs.showTaskbarLabels && h('span', null, app.title)
                    ]))
                ])
            ]);
        }

        render(h(Desktop), document.getElementById('app'));
    </script>
</body>
</html>
